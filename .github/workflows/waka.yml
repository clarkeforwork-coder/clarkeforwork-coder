name: Update WakaTime coding activity

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TITLE: "false"
          TIME_RANGE: "last_7_days"
          LANG_COUNT: "6"
          SHOW_TIME: "true"
          SHOW_TOTAL: "true"
          COMMIT_MESSAGE: "chore: update WakaTime coding activity"
