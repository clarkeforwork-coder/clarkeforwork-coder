<!DOCTYPE html>
<html lang="en">
<!--
    Profile header: neural-network pulse background (pure Canvas) + hacker/terminal identity overlay.
    Stage is exactly 800x387 — screen-record this box into a GIF (Kap / Gifox / ffmpeg).
-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarke — profile header</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: #010604;
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
        }
        /* The 800x387 stage — record exactly this box */
        #stage {
            position: relative;
            width: 800px; height: 387px;
            border: 1px solid #0f5;
            box-shadow: 0 0 45px rgba(0, 255, 120, 0.30);
            overflow: hidden;
            background: #010604;
        }
        #net { position: absolute; inset: 0; }

        /* Identity overlay — terminal style */
        #identity {
            position: absolute; inset: 0; z-index: 2;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
            background: radial-gradient(ellipse 58% 62% at 50% 50%, rgba(1,6,4,0.78) 0%, rgba(1,6,4,0) 70%);
            opacity: 0;
            animation: fadeIn 1.2s ease-out 0.2s forwards;
            font-family: 'Share Tech Mono', monospace;
        }
        .prompt {
            font-size: 1rem; letter-spacing: 0.15em;
            color: #4dffa6; margin: 0 0 10px;
            text-shadow: 0 0 8px rgba(0,255,120,0.6);
            opacity: 0.85;
        }
        .prompt .path { color: #2ce68f; }
        .prompt .cmd { color: #b6ffcf; }
        .name {
            font-family: 'Share Tech Mono', monospace;
            font-weight: 400; font-size: 4.2rem; line-height: 1;
            letter-spacing: 0.06em; margin: 0;
            color: #b6ffcf;
            text-shadow: 0 0 12px rgba(0,255,90,0.95), 0 0 34px rgba(0,255,90,0.55);
            animation: flicker 4.5s infinite steps(60);
        }
        .name .accent { color: #0f5; }
        .cursor {
            display: inline-block; width: 0.6ch; margin-left: 4px;
            background: #0f5; color: transparent;
            box-shadow: 0 0 12px rgba(0,255,90,0.9);
            animation: blink 1s steps(1) infinite;
        }
        .divider {
            width: 0; height: 2px; margin: 18px 0 14px;
            background: linear-gradient(90deg, transparent, #0f5, #4dffa6, transparent);
            box-shadow: 0 0 10px rgba(0,255,120,0.8);
            animation: grow 1.2s ease-out 0.9s forwards;
        }
        .role {
            font-size: 1.4rem; letter-spacing: 0.14em; text-transform: uppercase;
            color: #6cffb0; margin: 0;
            text-shadow: 0 0 8px rgba(0,255,120,0.5);
        }
        .tags {
            font-size: 0.95rem; letter-spacing: 0.28em; text-transform: uppercase;
            color: #3f9c72; margin: 12px 0 0;
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes grow   { to { width: 360px; } }
        @keyframes blink  { 50% { opacity: 0; } }
        @keyframes flicker {
            0%, 100%, 33%, 36%, 96% { opacity: 1; }
            34%, 35% { opacity: 0.75; }
            97%, 98% { opacity: 0.85; }
        }
    </style>
</head>

<body>
    <div id="stage">
        <canvas id="net" width="800" height="387"></canvas>
        <div id="identity">
            <p class="prompt"><span class="path">visitor@github</span>:~$ <span class="cmd">whoami</span></p>
            <h1 class="name">I'm <span class="accent">CLARKE</span><span class="cursor">_</span></h1>
            <div class="divider"></div>
            <p class="role">Backend Developer &nbsp;//&nbsp; Team Lead</p>
            <p class="tags">Java &nbsp;//&nbsp; Distributed Systems &nbsp;//&nbsp; Leadership</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('net');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;

        const NODE_COUNT = 60;
        const LINK_DIST = 120;
        const MAX_PULSES = 90;
        // Hacker-green palette
        const COLORS = ['#00ff41', '#22ff88', '#00e5a0', '#7dffb0'];

        function rand(a, b) { return a + Math.random() * (b - a); }
        function pick(arr) { return arr[(Math.random() * arr.length) | 0]; }

        const nodes = [];
        for (let i = 0; i < NODE_COUNT; i++) {
            nodes.push({
                x: rand(0, W), y: rand(0, H),
                vx: rand(-0.18, 0.18), vy: rand(-0.18, 0.18),
                r: rand(1.2, 2.6), phase: rand(0, Math.PI * 2), flash: 0
            });
        }

        const pulses = [];
        function neighbours(i) {
            const out = [], a = nodes[i];
            for (let j = 0; j < nodes.length; j++) {
                if (j === i) continue;
                const b = nodes[j];
                if (Math.hypot(a.x - b.x, a.y - b.y) < LINK_DIST) out.push(j);
            }
            return out;
        }
        function spawnPulse(from) {
            if (pulses.length >= MAX_PULSES) return;
            const ns = neighbours(from);
            if (!ns.length) return;
            pulses.push({ from, to: pick(ns), t: 0, speed: rand(0.010, 0.022), color: pick(COLORS) });
        }

        function frame() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(1, 6, 4, 0.22)';
            ctx.fillRect(0, 0, W, H);

            for (const n of nodes) {
                n.x += n.vx; n.y += n.vy;
                if (n.x < 0 || n.x > W) n.vx *= -1;
                if (n.y < 0 || n.y > H) n.vy *= -1;
                n.phase += 0.03;
                if (n.flash > 0) n.flash -= 0.04;
            }

            ctx.globalCompositeOperation = 'lighter';

            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const a = nodes[i], b = nodes[j];
                    const d = Math.hypot(a.x - b.x, a.y - b.y);
                    if (d < LINK_DIST) {
                        ctx.strokeStyle = `rgba(0, 255, 110, ${(1 - d / LINK_DIST) * 0.20})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
                    }
                }
            }

            for (let k = pulses.length - 1; k >= 0; k--) {
                const p = pulses[k], a = nodes[p.from], b = nodes[p.to];
                p.t += p.speed;
                const x = a.x + (b.x - a.x) * p.t, y = a.y + (b.y - a.y) * p.t;
                const g = ctx.createRadialGradient(x, y, 0, x, y, 8);
                g.addColorStop(0, p.color); g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2); ctx.fill();
                if (p.t >= 1) {
                    b.flash = 1; pulses.splice(k, 1);
                    if (Math.random() < 0.7) spawnPulse(p.to);
                }
            }

            for (const n of nodes) {
                const breathe = 0.55 + 0.45 * Math.sin(n.phase);
                const rr = n.r * (1 + n.flash * 3);
                const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, rr * 4);
                g.addColorStop(0, `rgba(200, 255, 210, ${0.9 * breathe})`);
                g.addColorStop(0.4, `rgba(0, 230, 110, ${0.5 * breathe})`);
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(n.x, n.y, rr * 4, 0, Math.PI * 2); ctx.fill();
            }

            requestAnimationFrame(frame);
        }

        setInterval(() => {
            const bursts = 1 + (Math.random() * 2 | 0);
            for (let i = 0; i < bursts; i++) spawnPulse((Math.random() * NODE_COUNT) | 0);
        }, 220);

        frame();
    </script>
</body>

</html>
